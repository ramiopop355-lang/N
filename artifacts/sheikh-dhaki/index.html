<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>سِيغْمَا Σ — مصحح رياضيات البكالوريا</title>
    <meta name="description" content="مصحح رياضيات البكالوريا الجزائرية 2026 بالذكاء الاصطناعي" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="dark light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Preconnect & DNS prefetch لتسريع أول تحميل (شبكات الجزائر) -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preload" href="/icon-512.png" as="image" type="image/png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="سيغما" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- أيقونة المتصفح -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="سِيغْمَا Σ — مصحح رياضيات البكالوريا" />
    <meta property="og:description" content="مصحح رياضيات البكالوريا الجزائرية بالذكاء الاصطناعي" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:type" content="website" />

    <!-- Fonts — Cairo فقط للتحميل السريع، Amiri تُحمَّل بشكل غير متزامن -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet"></noscript>

    <style>
      /* Safe-area + critical CSS to avoid white flash before app hydrates */
      :root {
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #0f0f1a;
        color: #f5f5f7;
        min-height: 100vh;
        font-family: 'Cairo', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      @media (prefers-color-scheme: light) {
        html, body { background: #ffffff; color: #0f0f1a; }
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
