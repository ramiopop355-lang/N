<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سِيغْمَا — لا يوجد اتصال</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      gap: 24px;
      padding: 24px;
      text-align: center;
      user-select: none;
    }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; color: white; font-weight: 900;
    }
    h1 { font-size: 1.4rem; color: #a5b4fc; }
    p  { font-size: 0.95rem; color: #64748b; max-width: 280px; line-height: 1.7; }
    button {
      margin-top: 8px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; border: none; border-radius: 12px;
      font-size: 1rem; cursor: pointer;
      font-family: inherit;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="logo">Σ</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تحقق من اتصالك ثم أعد المحاولة. سِيغْمَا تحتاج إنترنت للتصحيح بالذكاء الاصطناعي.</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
</body>
</html>
