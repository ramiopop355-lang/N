name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;34.0.0 platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias sigma-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass sigma2026 \
            -keypass sigma2026 \
            -dname "CN=Sigma Bac, OU=Education, O=Sigma, L=Algiers, ST=Algiers, C=DZ"

      - name: Build TWA (Android)
        run: |
          printf "sigma2026\nsigma2026\n" | bubblewrap build
        env:
          BUBBLEWRAP_SKIP_OPEN_JDK_WARNING: "true"

      - name: Show SHA-256 fingerprint
        run: |
          echo "==============================="
          echo "SHA-256 FINGERPRINT:"
          keytool -list -v \
            -keystore android.keystore \
            -alias sigma-key \
            -storepass sigma2026 2>/dev/null | grep "SHA256"
          echo "==============================="

      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: sigma-android-release
          path: |
            app-release-bundle.aab
            app-release.apk
            android.keystore
          if-no-files-found: warn

      - name: Upload keystore info
        uses: actions/upload-artifact@v4
        with:
          name: signing-info
          path: android.keystore
